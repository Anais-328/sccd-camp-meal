<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>營隊點餐系統 · 雛形</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F3F1EA;
    --ink:#1A1714;
    --ink-soft:#8A7F72;
    --coral:#E8432A;
    --coral-deep:#C3301A;
    --coral-soft:#FBDCD2;
    --pink:#F23F8C;
    --pink-deep:#D11F6C;
    --pink-soft:#FCDFEC;
    --sage:#7FB23A;
    --sage-soft:#E7F1D6;
    --gold:#F5A623;
    --gold-soft:#FBE8C4;
    --line:#E4DDCD;
    --card:#FFFFFF;
    --radius-lg:22px;
    --radius-md:14px;
    --shadow:0 10px 30px rgba(26,23,20,0.08);
    --shadow-press:0 2px 8px rgba(26,23,20,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 12% 8%, var(--gold-soft) 0%, transparent 42%),
      radial-gradient(circle at 88% 92%, var(--sage-soft) 0%, transparent 42%),
      var(--bg);
    min-height:100vh;
    font-family:'Noto Sans TC', sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:28px 16px 60px;
  }
  .stage{
    width:100%;
    max-width:460px;
  }
  .brand{
    text-align:center;
    margin-bottom:22px;
  }
  .brand .brand-eyebrow{
    font-size:11px;
    letter-spacing:0.16em;
    color:var(--ink-soft);
    margin-bottom:4px;
  }
  .brand .brand-main{
    font-family:'Noto Sans TC', sans-serif;
    font-weight:900;
    font-size:17px;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }
  .brand .brand-main .spark{color:var(--pink); font-size:13px;}
  .card{
    background:var(--card);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    padding:30px 24px 26px;
    animation:riseIn .42s cubic-bezier(.2,.7,.3,1);
  }
  @keyframes riseIn{
    from{opacity:0; transform:translateY(14px);}
    to{opacity:1; transform:translateY(0);}
  }
  .eyebrow{
    font-size:12px;
    font-weight:700;
    letter-spacing:0.14em;
    color:var(--coral-deep);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  h1.title{
    font-family:'Noto Sans TC', sans-serif;
    font-weight:900;
    font-size:25px;
    line-height:1.4;
    letter-spacing:-0.01em;
    margin:0 0 8px;
  }
  p.sub{
    color:var(--ink-soft);
    font-size:14.5px;
    line-height:1.7;
    margin:0 0 22px;
  }
  label.field-label{
    display:block;
    font-size:13px;
    font-weight:700;
    color:var(--ink-soft);
    margin:0 0 6px 2px;
  }
  input.field, select.field{
    width:100%;
    height:50px;
    box-sizing:border-box;
    font-family:'Noto Sans TC', sans-serif;
    font-size:16px;
    padding:0 14px;
    border-radius:var(--radius-md);
    border:1.6px solid var(--line);
    background:#FFFCF8;
    color:var(--ink);
    margin-bottom:16px;
    -webkit-appearance:none;
    appearance:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  input.field:focus, select.field:focus{
    outline:none;
    border-color:var(--coral);
    box-shadow:0 0 0 4px var(--coral-soft);
  }
  select.field{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%238A7F72' d='M7 10l5 5 5-5z'/></svg>");
    background-repeat:no-repeat;
    background-position:right 14px center;
    background-size:18px;
    padding-right:38px;
  }
  /* 日期輸入框:重置瀏覽器內建的行事曆圖示樣式,避免跟自訂外框打架變成一大圈 */
  input.field[type="date"]::-webkit-calendar-picker-indicator{
    margin-left:6px;
    padding:4px;
    border-radius:6px;
    cursor:pointer;
  }
  input.field[type="date"]::-webkit-datetime-edit{
    padding:0;
  }
  input.field[type="date"]::-webkit-inner-spin-button{
    display:none;
  }
  .btn{
    appearance:none;
    border:none;
    cursor:pointer;
    font-family:'Noto Sans TC', sans-serif;
    font-weight:700;
    font-size:15.5px;
    border-radius:var(--radius-md);
    padding:14px 18px;
    width:100%;
    transition:transform .12s ease, box-shadow .12s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{
    background:var(--coral);
    color:#fff;
    box-shadow:0 6px 16px rgba(232,67,42,0.35);
  }
  .btn-primary:disabled{
    background:#E9DFD3;
    color:#B3A493;
    box-shadow:none;
    cursor:not-allowed;
  }
  .btn-primary:not(:disabled):hover{box-shadow:0 8px 20px rgba(232,67,42,0.45);}
  .btn-ghost{
    background:transparent;
    color:var(--ink-soft);
    border:1.6px solid var(--line);
  }
  .btn-ghost:hover{border-color:var(--coral); color:var(--coral-deep);}
  .footnote{
    text-align:center;
    font-size:12px;
    color:var(--ink-soft);
    margin-top:18px;
    line-height:1.6;
  }
  .footnote button{
    background:none;border:none;color:var(--ink-soft);
    text-decoration:underline; cursor:pointer; font-size:12px;
    font-family:'Noto Sans TC', sans-serif;
  }
  .hero-art{
    margin-bottom:14px;
    animation:riseIn .5s cubic-bezier(.2,.7,.3,1);
    border-radius:var(--radius-lg);
    overflow:hidden;
    box-shadow:var(--shadow);
  }
  .hero-art img{display:block; width:100%; height:auto;}
  .footnote
    padding:12px 14px;
    font-size:12px;
    color:#3F5A21;
    line-height:1.8;
  }
  /* progress dots */
  .progress{
    display:flex; align-items:center; justify-content:center;
    gap:6px; margin-bottom:16px;
  }
  .progress .dot{
    width:7px; height:7px; border-radius:50%;
    background:var(--line);
    transition:background .25s ease, transform .25s ease;
  }
  .progress .dot.active{background:var(--coral); transform:scale(1.3);}
  .progress .dot.done{background:var(--gold);}
  .step-count{
    text-align:center; font-size:12px; color:var(--ink-soft);
    letter-spacing:0.08em; margin-bottom:4px;
  }

  /* meal screen */
  .meal-eyebrow{
    font-size:12.5px; font-weight:700; color:var(--ink-soft);
    letter-spacing:0.06em; margin-bottom:4px;
  }
  .meal-vendor{
    font-family:'Noto Sans TC', sans-serif; font-weight:900;
    font-size:23px; margin:0 0 22px; letter-spacing:-0.01em;
  }
  .sentence{
    font-family:'Noto Sans TC', sans-serif;
    font-weight:500;
    font-size:21px;
    line-height:2.1;
    text-align:center;
    margin:0 0 26px;
    color:var(--ink);
  }
  .slot{
    display:inline-block;
    min-width:2em;
    padding:0 4px 3px;
    border-bottom:2.5px solid var(--coral);
    color:var(--coral-deep);
    font-weight:900;
    transition:transform .18s cubic-bezier(.3,1.5,.5,1);
  }
  .slot.empty{
    color:var(--ink-soft); font-weight:400; border-color:var(--line);
  }
  .slot.accent-1{ border-color:var(--pink); color:var(--pink-deep); }
  .slot.pop{ animation:pop .32s cubic-bezier(.3,1.6,.4,1); }
  @keyframes pop{
    0%{transform:scale(0.7);}
    55%{transform:scale(1.14);}
    100%{transform:scale(1);}
  }
  .dims{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-bottom:8px;
  }
  .dim-col-label{
    font-size:12px; font-weight:700; color:var(--ink-soft);
    margin-bottom:8px; text-align:center; letter-spacing:0.06em;
  }
  .opt-btn{
    display:block;
    width:100%;
    text-align:center;
    background:#FFFCF8;
    border:1.6px solid var(--line);
    border-radius:12px;
    padding:11px 6px;
    margin-bottom:8px;
    font-family:'Noto Sans TC', sans-serif;
    font-size:14.5px;
    font-weight:500;
    color:var(--ink);
    cursor:pointer;
    transition:all .14s ease;
  }
  .opt-btn:hover{border-color:var(--coral);}
  .opt-btn:active{transform:scale(0.96);}
  .opt-btn.selected{
    background:var(--coral);
    border-color:var(--coral);
    color:#fff;
    font-weight:700;
    box-shadow:0 5px 14px rgba(232,67,42,0.3);
  }
  .opt-btn.selected.accent-1{
    background:var(--pink);
    border-color:var(--pink);
    box-shadow:0 5px 14px rgba(242,63,140,0.3);
  }
  .opt-btn:hover.accent-1{border-color:var(--pink);}
  .simple-grid{
    display:grid;
    gap:10px;
    margin-bottom:8px;
  }
  .simple-grid .opt-btn{padding:16px 10px; font-size:15.5px;}

  /* branch / reject / done */
  .icon-circle{
    width:56px; height:56px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:26px; margin:0 auto 16px;
  }
  .icon-circle.warn{background:var(--coral-soft); color:var(--coral-deep);}
  .icon-circle.ok{background:var(--sage-soft); color:#3F5A21;}
  .center{text-align:center;}
  .choice-row{display:flex; gap:10px; margin-top:6px;}
  .choice-row .btn{flex:1;}

  .summary-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 4px; border-bottom:1px solid var(--line);
    font-size:14.5px;
    cursor:pointer;
    border-radius:10px;
    transition:background .15s ease;
  }
  .summary-item:hover{background:var(--coral-soft);}
  .summary-item:active{transform:scale(0.985);}
  .summary-item:last-child{border-bottom:none;}
  .summary-item .meal-name{color:var(--ink-soft); font-size:12.5px;}
  .summary-item .meal-right{display:flex; align-items:center; gap:8px;}
  .summary-item .meal-choice{font-weight:700; color:var(--coral-deep); text-align:right;}
  .summary-item .edit-chevron{color:var(--ink-soft); font-size:18px;}
  .summary-hint{font-size:12px; color:var(--ink-soft); margin:-10px 0 10px;}

  /* admin */
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch; margin-top:8px; border-radius:10px;}
  table.admin-table{width:100%; border-collapse:collapse; font-size:13px;}
  table.admin-table th, table.admin-table td{
    text-align:left; padding:8px 10px; border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  table.admin-table th{color:var(--ink-soft); font-weight:700; font-size:11.5px; letter-spacing:0.04em; background:#FFFCF8;}
  table.admin-table td:first-child, table.admin-table th:first-child{position:sticky; left:0; background:#fff; }
  table.admin-table th:first-child{background:#FFFCF8;}
  .actions-cell{white-space:nowrap;}
  .icon-btn{
    border:1.4px solid var(--line);
    background:#fff;
    border-radius:8px;
    width:30px; height:30px;
    font-size:13px;
    cursor:pointer;
    margin-right:5px;
    transition:all .14s ease;
  }
  .icon-btn:hover{border-color:var(--coral); color:var(--coral-deep);}
  .icon-btn:active{transform:scale(0.92);}
  .icon-btn-danger:hover{border-color:#C3301A; background:var(--coral-soft);}
  .btn-danger{
    background:#fff;
    color:#C3301A;
    border:1.6px solid var(--coral-soft);
  }
  .btn-danger:hover{background:var(--coral-soft);}

  /* admin edit */
  .mini-meal{
    border:1.4px solid var(--line);
    border-radius:var(--radius-md);
    padding:12px 14px;
    margin-bottom:10px;
  }
  .mini-meal-label{font-size:12px; font-weight:700; color:var(--ink-soft); margin-bottom:8px;}
  .mini-dim-label{font-size:11px; color:var(--ink-soft); margin:8px 0 5px;}
  .mini-dim-label:first-child{margin-top:0;}
  .chip-row{display:flex; flex-wrap:wrap; gap:6px;}
  .chip{
    border:1.4px solid var(--line);
    background:#FFFCF8;
    border-radius:20px;
    padding:6px 13px;
    font-size:12.5px;
    font-family:'Noto Sans TC', sans-serif;
    cursor:pointer;
    transition:all .14s ease;
  }
  .chip:hover{border-color:var(--coral);}
  .chip.selected{background:var(--coral); border-color:var(--coral); color:#fff; font-weight:700;}
  .chip.selected.accent-1{background:var(--pink); border-color:var(--pink);}
  .stat-row{display:flex; justify-content:space-between; font-size:13.5px; padding:6px 0;}
  .stat-bar-bg{background:var(--line); border-radius:6px; height:6px; margin-top:4px; overflow:hidden;}
  .stat-bar-fill{background:var(--coral); height:100%; border-radius:6px;}
  .section-title{font-size:13px; font-weight:700; color:var(--ink-soft); margin:20px 0 8px; letter-spacing:0.04em;}

  .msg-error{
    background:var(--coral-soft); color:var(--coral-deep);
    border-radius:10px; padding:10px 12px; font-size:13px; margin-bottom:14px;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }

  /* ── 進度條 ── */
  .pg-wrap{height:4px;background:var(--line);border-radius:2px;margin:0 0 12px;overflow:hidden}
  .pg-fill{height:100%;background:var(--coral);border-radius:2px;transition:width .3s ease}
  /* ── 日期標籤 ── */
  .meal-date-label{font-size:11.5px;font-weight:700;color:var(--ink-soft);letter-spacing:.1em;margin-bottom:1px}
  /* ── 備注框 ── */
  .meal-note{background:var(--gold-soft);border-radius:10px;padding:8px 12px;font-size:12.5px;color:#7A5000;font-weight:500;margin:0 0 12px;line-height:1.5}
  /* ── Skip 按鈕 ── */
  .skip-row{text-align:center;margin:24px 0 28px}
  .skip-btn{display:inline-block;font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:700;border:2.5px dashed var(--coral);background:#FFF5F3;color:var(--coral-deep);border-radius:28px;padding:13px 36px;cursor:pointer;transition:all .18s ease;letter-spacing:.04em;min-width:180px}-spacing:.04em;min-width:200px}
  .skip-btn:hover{background:#ffe8e4;border-color:var(--coral);color:var(--coral-deep);border-style:solid}
  .skip-btn.skip-active{background:var(--ink);color:#fff;border-color:var(--ink);text-decoration:line-through;border-style:solid}
  /* ── Skip 句子 ── */
  .sentence-skip{text-decoration:line-through!important;opacity:.4!important}
  /* ── 禁用選項 ── */
  .opt-btn.opt-dis{opacity:.28!important;cursor:not-allowed!important;pointer-events:none}
  /* ── N/A slot ── */
  .slot-na{border-color:var(--line)!important;color:var(--ink-soft)!important;font-weight:400!important;font-style:italic}
  /* ── template text 不佔太多間距 ── */
  .tmpl-txt{display:inline}

</style>
</head>
<body>
  <div class="stage">
    <div id="app"></div>
  </div>

<script>
/* ═══ Color & Utility ═══ */
function dimColors(n){
  if(n===1)return['#ff68b4'];
  if(n===2)return['#ffd558','#7ce66d'];
  return['#ffd558','#7ce66d','#ff9b50'];
}
function dimTxt(bg){return(bg==='#ffd558'||bg==='#7ce66d')?'#1A1714':'#fff';}
function isOptDis(meal,pick,dk,v){
  if(!meal.disableRules)return false;
  for(const r of meal.disableRules){
    if(r.disable.dim!==dk)continue;
    if(!r.disable.values.includes(v))continue;
    if((pick||{})[r.when.dim]===r.when.value)return true;
  }
  return false;
}
function isDimAllDis(meal,pick,dk){
  const d=meal.dims.find(x=>x.key===dk);
  return d?d.options.every(o=>isOptDis(meal,pick,dk,o)):false;
}
function mealLabel(m,p){
  if(!p)return'—';
  if(p._skip)return'不用飲料';
  return m.tmpl.map(pt=>{
    const d=m.dims.find(x=>x.key===pt);
    return d?(p[d.key]||'?'):pt;
  }).join('');
}

/* ═══ 菜單資料 ═══ */
const MEALS=[

   tmpl:['我要吃','a','義大利','b'],
   dims:[
     {key:'a',label:'口味',options:['奶油培根','松子青醬蛤蜊','蕃茄蔬菜雞肉醬','蕃茄蔬菜焗烤(素)','奶油蔬菜焗烤(素)']},
     {key:'b',label:'主食',options:['飯','麵']}]},

   tmpl:['我要吃','a','炒','b'],
   dims:[
     {key:'a',label:'肉類',options:['牛肉','羊肉','豬肉','青菜(素)']},
     {key:'b',label:'主食',options:['飯','麵']}],
   disableRules:[{when:{dim:'a',value:'青菜(素)'},disable:{dim:'b',values:['麵']}}]},
  {id:'d1-drink',date:'7/15',dow:'三',meal:'飲料',vendor:'可不可',
   note:'統一微冰',skipLabel:'不用喝飲料',

     {key:'b',label:'飲品',options:['白玉歐蕾','冷露歐蕾']}]},
  /* 7/16 (四) */
  {id:'d2-breakfast',date:'7/16',dow:'四',meal:'早餐',vendor:'包子商行',
   tmpl:['我要吃','a','配','b','\u00a0','c'],
   dims:[
     {key:'a',label:'主食',options:['黑糖饅頭','原味肉包','素香筍包(素)']},
     {key:'b',label:'溫度',options:['冰','溫']},
     {key:'c',label:'飲品',options:['紅茶','豆漿']}]},
  {id:'d2-lunch',date:'7/16',dow:'四',meal:'午餐',vendor:'八方雲集',
   tmpl:['我要吃','a'],
   dims:[{key:'a',label:'鍋貼',options:['招牌鍋貼','韓式鍋貼（微辣）','新蔬食鍋貼(素)']}]},
  {id:'d2-dinner',date:'7/16',dow:'四',meal:'晚餐',vendor:'梁社漢便當',
   note:'素食5菜便當將另購',
   tmpl:['我要吃','a'],
   dims:[{key:'a',label:'便當',options:['滷排骨便當','炸雞腿便當','素食5菜便當']}]},
  {id:'d2-drink',date:'7/16',dow:'四',meal:'飲料',vendor:'50嵐',
   note:'統一微冰',skipLabel:'不用喝飲料',
   tmpl:['我要喝','a','的','b'],
   dims:[
     {key:'a',label:'甜度',options:['半糖','微糖','無糖']},
     {key:'b',label:'飲品',options:['1號','波霸奶茶']}]},
  /* 7/17 (五) */
  {id:'d3-breakfast',date:'7/17',dow:'五',meal:'早餐',vendor:'富貴村',
   tmpl:['我要吃','a','配','b','\u00a0','c'],
   dims:[
     {key:'a',label:'主食',options:['奶油厚片','巧克力厚片']},
     {key:'b',label:'溫度',options:['冰','溫']},
     {key:'c',label:'飲品',options:['紅茶','綠茶','薯餅(一塊)']}],
   disableRules:[{when:{dim:'c',value:'薯餅(一塊)'},disable:{dim:'b',values:['冰','溫']}}]},
  {id:'d3-lunch',date:'7/17',dow:'五',meal:'午餐',vendor:'大直雞肉飯',
   note:'素食5菜便當將另購',
   tmpl:['我要吃','a'],
   dims:[{key:'a',label:'餐點',options:['雞肉飯（有配菜）','咖哩雞肉飯（有配菜）','素食5菜便當']}]},
  /* 7/18 (六) */
  {id:'d4-breakfast',date:'7/18',dow:'六',meal:'早餐',vendor:'媽媽樂早餐屋',
   tmpl:['我要吃','a','配','b','\u00a0','c'],
   dims:[
     {key:'a',label:'主食',options:['起司蛋餅','玉米蛋餅','港式蘿蔔糕']},

/* Firebase Realtime Database（REST API，無需 SDK）*/
const DB='https://sccd-camp-2026-default-rtdb.asia-southeast1.firebasedatabase.app';
function safeKey(name,bday){return(name+'_'+bday).replace(/[.#$[\]/\s]/g,'_');}

async function saveResponse(record){
  try{
    const k=safeKey(record.name,record.birthday);
    record.submittedAt=Date.now();
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),10000);
    const res=await fetch(`${DB}/responses/${encodeURIComponent(k)}.json`,{
      method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(record),signal:ctrl.signal
    });
    clearTimeout(t);
    if(!res.ok){const txt=await res.text();console.error('Firebase error:',res.status,txt);}
    return res.ok;
  }catch(e){console.error('save error',e);return false;}
}
async function loadAllResponses(){
  try{
    const res=await fetch(`${DB}/responses.json`);
    const data=await res.json();
    if(!data)return[];
    return Object.entries(data).map(([k,v])=>({...v,__key:k}))
      .sort((a,b)=>(a.submittedAt||0)-(b.submittedAt||0));
  }catch(e){console.error('load error',e);return[];}
}
async function deleteResponseByKey(k){
  try{
    const res=await fetch(`${DB}/responses/${encodeURIComponent(k)}.json`,{method:'DELETE'});
    return res.ok;
  }catch(e){return false;}
}
async function updateResponseByKey(k,r){
  try{
    const c=Object.assign({},r);delete c.__key;
    const res=await fetch(`${DB}/responses/${encodeURIComponent(k)}.json`,{
      method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(c)
    });
    return res.ok;
  }catch(e){return false;}
}


/* ═══ 密碼確認彈窗（刪除/清空用）═══ */
const DEL_PASS='0328';
function confirmWithPass(callback){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:9999;';
  ov.innerHTML=`
    <div style="background:#fff;border-radius:18px;padding:26px 22px;width:290px;max-width:92vw;box-shadow:0 24px 60px rgba(0,0,0,.25);">
      <div style="font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:15px;color:#1A1714;margin-bottom:14px;">請輸入操作密碼</div>
      <input id="_pi" type="password" inputmode="numeric" placeholder="密碼"
        style="width:100%;box-sizing:border-box;border:1.8px solid #ddd;border-radius:10px;padding:10px 12px;font-size:16px;font-family:inherit;margin-bottom:6px;outline:none;"/>
      <div id="_pe" style="color:#E8432A;font-size:12px;min-height:16px;margin-bottom:10px;"></div>
      <div style="display:flex;gap:8px;">
        <button id="_pc" style="flex:1;padding:11px;border:1.6px solid #ddd;background:#fff;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;">取消</button>
        <button id="_pok" style="flex:1;padding:11px;background:#E8432A;color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;">確認</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  const inp=document.getElementById('_pi');
  inp.focus();
  function check(){
    if(inp.value===DEL_PASS){document.body.removeChild(ov);callback();}
    else{document.getElementById('_pe').textContent='密碼錯誤，請再試一次';inp.value='';inp.focus();}
  }
  document.getElementById('_pok').onclick=check;
  document.getElementById('_pc').onclick=()=>document.body.removeChild(ov);
  inp.onkeydown=e=>{if(e.key==='Enter')check();};
  ov.onclick=e=>{if(e.target===ov)document.body.removeChild(ov);};
}

    <div class="card">
      <div class="eyebrow">Step 1 · 身分驗證</div>
      <h1 class="title">先核對一下你的報名資料</h1>
      <p class="sub">請輸入跟報名時一致的姓名與生日，系統會比對名單。</p>
      ${state.errorMsg?`<div class="msg-error">${state.errorMsg}</div>`:''}
      <label class="field-label">姓名</label>
      <input class="field" id="in-name" placeholder="王小明"/>
      <label class="field-label">生日</label>
      <input class="field" id="in-bday" type="date"/>
      <button class="btn btn-primary" id="btn-verify">驗證身分</button>
    </div>
  `;
  /* 橫幅點3下進後台 */
  const img=document.getElementById('hero-img');
  if(img){img.onclick=()=>{
    _aTaps++;clearTimeout(_aTimer);
    _aTimer=setTimeout(()=>{_aTaps=0;},2000);
    if(_aTaps>=3){_aTaps=0;clearTimeout(_aTimer);state.view='admin-login';render();}
  };}
  document.getElementById('btn-verify').onclick=()=>{
    const name=document.getElementById('in-name').value.trim();
    const bday=document.getElementById('in-bday').value;
    if(!name||!bday){state.errorMsg='請完整填寫姓名與生日。';return render();}
    /* 支援 aliases 雙名比對 */
    const found=ROSTER.find(p=>{
      if(p.birthday!==bday)return false;
      if(p.name===name)return true;
      if(p.aliases&&p.aliases.some(a=>a===name))return true;
      return false;
    });
    if(!found){state.view='reject';state.errorMsg='';return render();}
    state.person=found;state.errorMsg='';
    if(found.group==='大二'){state.view='branch';}
    else{state.view='greet';state.mealIndex=0;}
    render();
  };
}

/* ═══ 選餐頁面（核心）═══ */
function renderMeal(){
  const meal=MEALS[state.mealIndex];
  const total=MEALS.length;
  const pick=state.picks[meal.id]||{};
  const isSkip=pick._skip===true;
  const nd=meal.dims.length;
  const clrs=dimColors(nd);

  /* 進度條 */
  const pct=Math.round((state.mealIndex/total)*100);

  /* 句子 from template */
  function buildSentence(){
    return meal.tmpl.map(pt=>{
      const di=meal.dims.findIndex(x=>x.key===pt);
      if(di<0) return pt?`<span class="tmpl-txt">${pt}</span>`:'';
      const dim=meal.dims[di];
      const allDis=isDimAllDis(meal,pick,dim.key);
      if(allDis) return `<span class="slot slot-na" id="slot-${dim.key}">——</span>`;
      const v=pick[dim.key];
      const c=clrs[di];
      const empty=!v;
      return `<span class="slot${empty?' empty':''}" id="slot-${dim.key}"
        style="${empty?'':'border-color:'+c+';color:'+c+';'}">${v||'　　'}</span>`;
    }).join('');
  }

  /* dims grid */
  const gridCols=meal.dims.map(()=>'1fr').join(' ');
  const dimsHtml=`<div class="dims" style="grid-template-columns:${gridCols}">
    ${meal.dims.map((dim,di)=>{
      const c=clrs[di];
      const tc=dimTxt(c);
      return `<div>
        <div class="dim-col-label" style="color:${c}">${dim.label}</div>
        ${dim.options.map(opt=>{
          const sel=pick[dim.key]===opt;
          const dis=isOptDis(meal,pick,dim.key,opt);
          let st='';
          if(sel) st=`background:${c};border-color:${c};color:${tc};box-shadow:0 4px 12px ${c}66;`;
          else if(dis) st='';
          return `<button class="opt-btn${sel?' selected':''}${dis?' opt-dis':''}"
            data-dim="${dim.key}" data-val="${opt}"
            style="${st}" ${dis?'disabled':''}>${opt}</button>`;
        }).join('')}
      </div>`;
    }).join('')}
  </div>`;

  /* skip button */
  const skipHtml=meal.skipLabel?`
    <div class="skip-row">
      <button class="skip-btn${isSkip?' skip-active':''}" id="btn-skip">${meal.skipLabel}</button>
    </div>`:'';

  /* note */
  const noteHtml=meal.note?`<div class="meal-note">📌 ${meal.note}</div>`:'';

  app.innerHTML=`
    <div class="pg-wrap"><div class="pg-fill" style="width:${pct}%"></div></div>
    <div class="step-count">第 ${state.mealIndex+1} / ${total} 道</div>
    <div class="card">
      <div class="meal-date-label">${meal.date}（${meal.dow}）</div>
      <div class="meal-eyebrow">${meal.meal}</div>
      <h1 class="meal-vendor">${meal.vendor}</h1>
      ${noteHtml}
      <p class="sentence${isSkip?' sentence-skip':''}" id="meal-sentence">${buildSentence()}</p>
      ${dimsHtml}
      ${skipHtml}
      <button class="btn btn-primary" id="btn-next" disabled>${
        state.editingFromSummary?'確認修改，返回總覽':('確認，'+(state.mealIndex<total-1?'下一道':'看總覽'))
      }</button>
      ${state.editingFromSummary?'<div style="height:10px"></div><button class="btn btn-ghost" id="btn-cancel-edit">不修改，返回總覽</button>':''}
    </div>`;

  /* check complete */
  function chk(){
    const p=state.picks[meal.id]||{};
    const done=(meal.skipLabel&&p._skip===true)||meal.dims.every(d=>{
      if(isDimAllDis(meal,p,d.key))return true;
      const v=p[d.key];
      if(!v)return false;
      if(isOptDis(meal,p,d.key,v))return false;
      return true;
    });
    document.getElementById('btn-next').disabled=!done;
  }

  /* dim button click */
  document.querySelectorAll('.opt-btn:not(.opt-dis)').forEach(b=>{
    b.onclick=()=>{
      if(!state.picks[meal.id])state.picks[meal.id]={};
      const p=state.picks[meal.id];
      delete p._skip;
      const dk=b.dataset.dim, v=b.dataset.val;
      p[dk]=v;
      /* clear disabled selections triggered by this change */
      if(meal.disableRules){
        for(const r of meal.disableRules){
          if(r.when.dim===dk&&r.when.value===v){
            if(r.disable.values.includes(p[r.disable.dim]))delete p[r.disable.dim];
          }
        }
      }
      render();
    };
  });

  /* skip toggle */
  const skipBtn=document.getElementById('btn-skip');
  if(skipBtn){skipBtn.onclick=()=>{
    if(!state.picks[meal.id])state.picks[meal.id]={};
    const p=state.picks[meal.id];
    if(p._skip)delete p._skip; else p._skip=true;
    render();
  };}

  chk();

  document.getElementById('btn-next').onclick=()=>{
    if(state.editingFromSummary){state.editingFromSummary=false;state.view='summary';render();return;}
    if(state.mealIndex<total-1)state.mealIndex++;
    else state.view='summary';
    render();
  };
  const ce=document.getElementById('btn-cancel-edit');
  if(ce){ce.onclick=()=>{state.editingFromSummary=false;state.view='summary';render();};}
}

/* ═══ 總覽確認 ═══ */
function renderSummary(){
  const rows=MEALS.map((m,i)=>{
    const p=state.picks[m.id];
    const isSkip=p&&p._skip;
    const lbl=mealLabel(m,p);
    return `
      <div class="summary-item${isSkip?' sum-skip':''}" data-meal-index="${i}">
        <div class="meal-name">${m.date}（${m.dow}）${m.meal}<br>${m.vendor}</div>
        <div class="meal-right">
          <div class="meal-choice" style="${isSkip?'text-decoration:line-through;opacity:.5':''}">${lbl}</div>
          <div class="edit-chevron">›</div>
        </div>
      </div>`;
  }).join('');

  app.innerHTML=`
    <div class="card">
      <div class="eyebrow">最後確認</div>
      <h1 class="title">${state.person.name}，確認一下你的餐點</h1>
      <p class="sub">想改哪一道，點那一列就可以直接修改。</p>
      ${rows}
      <div style="height:18px"></div>
      <button class="btn btn-primary" id="btn-submit">送出</button>
    </div>`;

  document.querySelectorAll('.summary-item').forEach(el=>{
    el.onclick=()=>{
      state.mealIndex=parseInt(el.dataset.mealIndex,10);
      state.editingFromSummary=true;state.view='meal';render();
    };
  });
  document.getElementById('btn-submit').onclick=async()=>{
    const btn=document.getElementById('btn-submit');
    btn.disabled=true;btn.textContent='送出中…';
    const ok=await saveResponse({
      name:state.person.name,birthday:state.person.birthday,
      group:state.person.group,joining:true,picks:state.picks
    });
    if(!ok){
      btn.disabled=false;btn.textContent='送出';
      alert('送出失敗，請確認網路連線後再試一次。\n（若重試仍失敗，請截圖告知主辦方）');
      return;
    }
    state.view='done';render();
  };
}

      <div class="icon-circle ok">✓</div>
      <h1 class="title">完成囉，謝謝 ${state.person.name}！</h1>
      <p class="sub">你的餐點選擇已送出，營隊見！</p>

  app.innerHTML=`

      <div class="eyebrow">管理者後台</div>
      <h1 class="title">輸入密碼</h1>

  document.getElementById('btn-back').onclick=()=>{state.errorMsg='';state.view='verify';render();};
}

/* ═══ 後台儀表板 ═══ */
function renderAdminDash(){
  app.innerHTML=`<div class="card center"><p class="sub">載入中...</p></div>`;
  (async()=>{
  const all=await loadAllResponses();
  const joined=all.filter(r=>r.joining!==false);
  const optOut=all.filter(r=>r.joining===false);

  function pickLabel(r,m){
    if(r.joining===false)return'—';
    const p=r.picks&&r.picks[m.id];
    if(!p)return'—';
    return mealLabel(m,p);
  }

  /* 統計各餐 */
  const statsHtml=MEALS.map(m=>{
    const counts={};
    joined.forEach(r=>{
      const p=r.picks&&r.picks[m.id];
      if(!p)return;
      const lbl=mealLabel(m,p);
      if(lbl&&lbl!=='?')counts[lbl]=(counts[lbl]||0)+1;
    });
    const maxC=Math.max(1,...Object.values(counts));
    const rows=Object.entries(counts).map(([k,v])=>`
      <div class="stat-row"><span>${k}</span><span>${v}</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${v/maxC*100}%"></div></div>
    `).join('')||'<p class="sub" style="margin:4px 0">尚無資料</p>';
    return `<div class="section-title">${m.date}（${m.dow}）${m.meal} · ${m.vendor}</div>${rows}`;
  }).join('');

  /* 三組明細表格 */
  const mealCols=MEALS.map(m=>`${m.date} ${m.meal}`);
  function fmtTime(ts){
    if(!ts)return'—';
    const d=new Date(ts);
    return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }
  function buildGroupTable(list){
    if(!list.length)return'<p class="sub" style="margin:6px 0 18px">尚無資料</p>';
    const head=`<th>姓名</th><th>填寫時間</th>`+mealCols.map(c=>`<th>${c}</th>`).join('')+`<th>操作</th>`;
    const rows=list.map(r=>{
      const nc=r.name+(r.joining===false?'<br><span style="color:var(--ink-soft);font-size:11px">(自己解決)</span>':'');
      const timeCell=`<td style="font-size:11.5px;color:var(--ink-soft);white-space:nowrap">${fmtTime(r.submittedAt)}</td>`;
      const cells=MEALS.map(m=>`<td>${pickLabel(r,m)}</td>`).join('');
      return `<tr><td>${nc}</td>${timeCell}${cells}
        <td class="actions-cell">
          <button class="icon-btn row-edit-btn" data-key="${r.__key}" title="編輯">✎</button>
          <button class="icon-btn icon-btn-danger row-delete-btn" data-key="${r.__key}" title="刪除">🗑</button>
        </td></tr>`;
    }).join('');
    return`<div class="table-scroll"><table class="admin-table"><tr>${head}</tr>${rows}</table></div>`;
  }

  const hs=all.filter(r=>r.group==='高中生');
  const y1=all.filter(r=>r.group==='大一');
  const y2=all.filter(r=>r.group==='大二');

  app.innerHTML=`
    <div class="card">
      <div class="eyebrow">管理者後台</div>
      <h1 class="title">回覆總覽</h1>
      <p class="sub">共 ${all.length} 筆 · ${joined.length} 人一起訂 · ${optOut.length} 人不訂餐</p>
      ${statsHtml}
      <div class="section-title">高中生（${hs.length} 人）</div>${buildGroupTable(hs)}
      <div class="section-title">大一小隊輔（${y1.length} 人）</div>${buildGroupTable(y1)}
      <div class="section-title">大二工作人員（${y2.length} 人）</div>${buildGroupTable(y2)}
      <div style="height:18px"></div>
      <button class="btn btn-ghost" id="btn-back">回到填寫畫面</button>
      <div style="height:10px"></div>
      <button class="btn btn-danger" id="btn-clear-all">清空所有資料（正式上線前清測試用）</button>
    </div>`;

  document.getElementById('btn-back').onclick=()=>{state.view='verify';render();};
  document.querySelectorAll('.row-edit-btn').forEach(b=>{
    b.onclick=()=>{
      const k=b.dataset.key;const rec=all.find(r=>r.__key===k);if(!rec)return;
      state.adminEditKey=k;state.adminEditRecord=JSON.parse(JSON.stringify(rec));
      state.view='admin-edit';render();
    };
  });
  document.querySelectorAll('.row-delete-btn').forEach(b=>{
    b.onclick=()=>{
      confirmWithPass(async()=>{
        await deleteResponseByKey(b.dataset.key);
        renderAdminDash();
      });
    };
  });
  const clearBtn=document.getElementById('btn-clear-all');
  clearBtn.onclick=()=>{
    if(!all.length){clearBtn.textContent='目前沒有資料';setTimeout(()=>renderAdminDash(),1500);return;}
    confirmWithPass(async()=>{
      await Promise.all(all.map(r=>deleteResponseByKey(r.__key)));
      renderAdminDash();
    });
  };
  })();
}
/* ═══ 後台編輯 ═══ */
function renderAdminEdit(){
  const rec=state.adminEditRecord;
  const isY2=rec.group==='大二';
  const joining=rec.joining!==false;

  function buildMiniMeals(){
    if(isY2&&!joining)return'<p class="sub" style="margin:0 0 14px">這位不參加訂餐，沒有餐點資料。</p>';
    return MEALS.map(m=>{
      const pick=(rec.picks&&rec.picks[m.id])||{};
      const isSkip=pick._skip===true;
      const nd=m.dims.length;
      const clrs=dimColors(nd);
      const dimsHtml=m.dims.map((d,di)=>{
        const c=clrs[di];
        const chips=d.options.map(opt=>{
          const sel=pick[d.key]===opt;
          return `<button class="chip${sel?' selected':''}" style="${sel?'background:'+c+';border-color:'+c+';color:'+dimTxt(c)+';':''}"
            data-meal="${m.id}" data-dim="${d.key}" data-val="${opt}">${opt}</button>`;
        }).join('');
        return `<div class="mini-dim-label" style="color:${c}">${d.label}</div><div class="chip-row">${chips}</div>`;
      }).join('');
      const skipChip=m.skipLabel?`
        <div class="chip-row" style="margin-top:8px">
          <button class="chip${isSkip?' selected':''}" data-meal="${m.id}" data-skip="1">${m.skipLabel}</button>
        </div>`:'';
      return `<div class="mini-meal">
        <div class="mini-meal-label">${m.date}（${m.dow}）${m.meal} · ${m.vendor}</div>
        ${dimsHtml}${skipChip}
      </div>`;
    }).join('');
  }

  app.innerHTML=`
    <div class="card">
      <div class="eyebrow">後台 · 編輯回覆</div>
      <h1 class="title">編輯 ${rec.name} 的回覆</h1>
      <label class="field-label">姓名</label>
      <input class="field" id="edit-name" value="${rec.name}"/>
      <label class="field-label">組別</label>
      <select class="field" id="edit-group">
        <option value="高中生" ${rec.group==='高中生'?'selected':''}>高中生</option>
        <option value="大一" ${rec.group==='大一'?'selected':''}>大一小隊輔</option>
        <option value="大二" ${rec.group==='大二'?'selected':''}>大二工作人員</option>
      </select>
      ${isY2?`
        <label class="field-label">是否參加訂餐</label>
        <div class="choice-row" style="margin-bottom:18px">
          <button class="btn ${joining?'btn-ghost':'btn-primary'}" id="edit-no">不參加</button>
          <button class="btn ${joining?'btn-primary':'btn-ghost'}" id="edit-yes">參加</button>
        </div>`:''}
      <div id="edit-meals">${buildMiniMeals()}</div>
      <div style="height:8px"></div>
      <button class="btn btn-primary" id="btn-save-edit">儲存修改</button>
      <div style="height:10px"></div>
      <button class="btn btn-ghost" id="btn-cancel-edit-admin">取消，不修改</button>
    </div>`;

  document.getElementById('edit-name').oninput=e=>{rec.name=e.target.value;};
  document.getElementById('edit-group').onchange=e=>{
    rec.group=e.target.value;
    if(rec.group!=='大二')rec.joining=true;
    render();
  };
  if(isY2){
    document.getElementById('edit-yes').onclick=()=>{rec.joining=true;render();};
    document.getElementById('edit-no').onclick=()=>{rec.joining=false;render();};
  }
  document.querySelectorAll('#edit-meals .chip').forEach(b=>{
    b.onclick=()=>{
      if(!rec.picks)rec.picks={};
      const mid=b.dataset.meal;
      if(!rec.picks[mid])rec.picks[mid]={};
      if(b.dataset.skip){rec.picks[mid]={_skip:true};}
      else{
        delete rec.picks[mid]._skip;
        rec.picks[mid][b.dataset.dim]=b.dataset.val;
      }
      render();
    };
  });
  document.getElementById('btn-save-edit').onclick=async()=>{
    const n=document.getElementById('edit-name').value.trim();
    if(!n){alert('姓名不能空白。');return;}
    rec.name=n;
    if(!await updateResponseByKey(state.adminEditKey,rec)){alert('儲存失敗，請再試一次。');return;}
    state.adminEditKey=null;state.adminEditRecord=null;state.view='admin-dash';render();
  };
  document.getElementById('btn-cancel-edit-admin').onclick=()=>{
    state.adminEditKey=null;state.adminEditRecord=null;state.view='admin-dash';render();
  };
}

render();
</script>
